# Set true color
set-option -sa terminal-features ',st*:RGB'
set -g mouse on

# Propagate Wayland/X display env vars so clipboard tools (wl-copy, xclip) work
set-option -g update-environment "WAYLAND_DISPLAY DISPLAY"

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Set prefix
unbind C-b
set -g prefix C-s
bind C-Space send-prefix

# set vi-mode
set-window-option -g mode-keys vi
# keybindings
bind v copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Setting up keybinding for finding tmux sessions
bind C-f display-popup -E "tmux-sessionizer"
bind C-w display-popup -E "tmux-workspace #{session_name} #{window_index}"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'catppuccin/tmux#v2.3.0'
set -g @plugin 'fcsonline/tmux-thumbs'

# Catppuccin theme
set -g @catppuccin_flavor 'macchiato'
set -g @catppuccin_window_status_style "rounded"

# Status bar
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_gitmux}"
set -ag status-right "#{E:@catppuccin_status_session}"

# tmux-thumbs — prefix + f to activate hint mode
set -g @thumbs-key 'f'
set -g @thumbs-alphabet 'qwerty-homerow'
set -g @thumbs-unique 'enabled'
set -g @thumbs-command 'echo -n {} | wl-copy && tmux display-message "Copied {}"'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
